services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sona_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-sona_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sona_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sona-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sona-dashboard-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sona_user}:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/${POSTGRES_DB:-sona_dashboard}
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-4}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      LMSTUDIO_MODEL: ${LMSTUDIO_MODEL:-}
      LMSTUDIO_API_KEY: ${LMSTUDIO_API_KEY:-lm-studio}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3001/api/calendar/oauth/callback}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 3001
      FRONTEND_URL: http://localhost:3010
    networks:
      - sona-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sona-dashboard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3010:3000"
    environment:
      - SONA_API_URL=http://backend:3001
      - NEXT_PUBLIC_SONA_API_URL=${NEXT_PUBLIC_SONA_API_URL:-http://localhost:3001}
    networks:
      - sona-network

networks:
  sona-network:
    driver: bridge

volumes:
  pgdata:
