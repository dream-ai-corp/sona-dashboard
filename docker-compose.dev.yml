version: "3.8"
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /home/beniben/sona-workspace:/home/beniben/sona-workspace
    environment:
      - NEXT_PUBLIC_API_URL=
      - SONA_API_URL=http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sona-net

  backend:
    command: npm run dev
    volumes:
      - ./backend:/app
    environment:
      - PORT=3011
      - SONA_API_URL=http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sona-net

networks:
  sona-net:
    driver: bridge
