# Hot-reload dev override.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Mounts host source into containers and runs dev servers so changes reload instantly.
# Node modules live inside named volumes to avoid clobbering host installs.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/prisma:/app/backend/prisma
      - ./backend/package.json:/app/backend/package.json
      - ./backend/tsconfig.json:/app/backend/tsconfig.json
      - ./shared/src:/app/shared/src
      - ./shared/package.json:/app/shared/package.json
      - ./shared/tsconfig.json:/app/shared/tsconfig.json
      - backend_node_modules:/app/backend/node_modules
      - shared_node_modules:/app/shared/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  backend_node_modules:
  frontend_node_modules:
  shared_node_modules:
